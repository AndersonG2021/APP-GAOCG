<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GAOCG App - Gestão Orçamentária dos Contratos de Gestão</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="sobreposicaoCarregando" class="oculto"><div class="spinner"></div></div>
  <div id="containerToasts"></div>

  <!-- TELA DE LOGIN -->
  <section id="telaLogin">
    <div class="cartao-login">
      <h1>GAOCG App</h1>
      <p class="subtitulo">Gerência Administrativa Orçamentária dos Contratos de Gestão</p>
      <form id="formLogin" novalidate>
        <div class="campo">
          <label for="loginUsuario">Usuário</label>
          <input id="loginUsuario" type="text" autocomplete="username" required />
        </div>
        <div class="campo">
          <label for="loginSenha">Senha</label>
          <input id="loginSenha" type="password" autocomplete="current-password" required />
        </div>
        <p id="loginErro" class="erro-campo oculto"></p>
        <button type="submit" class="botao primario" style="width:100%">Entrar</button>
      </form>
    </div>
  </section>

  <!-- APLICAÇÃO -->
  <div id="appShell" class="oculto">
    <aside id="barraLateral">
      <div class="logo">GAOCG App</div>
      <nav>
        <button data-tela="dashboard" class="ativo">Dashboard</button>
        <button data-tela="sof">SOF</button>
        <button data-tela="notasEmpenho">Notas de Empenho</button>
        <button data-tela="recibos">Recibos</button>
        <button data-tela="unidades">Unidades</button>
        <button data-tela="listas">Listas Personalizadas</button>
        <button data-tela="logAuditoria">Log de Auditoria</button>
        <button data-tela="usuarios" class="somente-gerente oculto">Usuários</button>
      </nav>
    </aside>
    <div id="fundoMenuMobile" class="fundo-menu-mobile oculto"></div>

    <div id="areaPrincipal">
      <header id="barraTopo">
        <button type="button" id="btnMenuMobile" class="botao-icone oculto-desktop" aria-label="Abrir menu">☰</button>
        <div id="tituloTopo" style="font-weight:600;color:var(--azul-escuro)"></div>
        <div style="display:flex;align-items:center;gap:16px">
          <div class="usuario-info">
            <strong id="nomeUsuarioTopo"></strong>
            <span id="perfilUsuarioTopo"></span>
          </div>
          <button id="btnSair" class="botao">Sair</button>
        </div>
      </header>
      <main id="conteudo"></main>
    </div>
  </div>

  <!-- MODAL GENÉRICO (reaproveitado por todas as telas) -->
  <div id="sobreposicaoModal" class="sobreposicao-modal oculto">
    <div id="modal" class="modal">
      <div class="modal-cabecalho">
        <h3 id="modalTitulo"></h3>
        <button type="button" class="fechar" id="botaoFecharModal">&times;</button>
      </div>
      <div class="modal-corpo" id="modalCorpo"></div>
      <div class="modal-rodape" id="modalRodape"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/unidades.js"></script>
  <script src="js/listas.js"></script>
  <script src="js/usuarios.js"></script>
  <script src="js/edicao-simultanea.js"></script>
  <script src="js/sof.js"></script>
  <script src="js/notas-empenho.js"></script>
  <script src="js/recibos.js"></script>
  <script src="js/log-auditoria.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
